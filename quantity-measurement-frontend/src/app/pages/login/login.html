<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Left branding panel -->
    <div class="auth-left">
      <img src="Icon.jpeg" alt="QM Logo" class="brand-img" />
      <div class="brand">QUANTITY<br>MEASUREMENT</div>
    </div>

    <!-- Right form panel -->
    <div class="auth-right">
      <div class="tabs">
        <button type="button" class="tab-btn active">LOGIN</button>
        <button type="button" class="tab-btn" routerLink="/signup">SIGNUP</button>
      </div>

      <!-- OAuth loading overlay -->
      <div class="oauth-loading" *ngIf="oauthLoading">
        <div class="oauth-spinner"></div>
        <span>Signing you in with Google...</span>
      </div>

      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate *ngIf="!oauthLoading">

        <div class="field-label">Email Id</div>
        <div class="input-wrap">
          <span class="icon">✉</span>
          <input
            type="email"
            name="email"
            placeholder="Email Id"
            [(ngModel)]="email"
            required
            email
            #emailField="ngModel"
            [class.input-error]="emailField.invalid && emailField.touched"
          />
        </div>
        <div class="field-error" *ngIf="emailField.invalid && emailField.touched">
          Enter a valid email address.
        </div>

        <div class="field-label">Password</div>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input
            type="password"
            name="password"
            placeholder="Password"
            [(ngModel)]="password"
            required
            #passwordField="ngModel"
            [class.input-error]="passwordField.invalid && passwordField.touched"
          />
        </div>
        <div class="field-error" *ngIf="passwordField.invalid && passwordField.touched">
          Password is required.
        </div>

        <!-- API error -->
        <div class="api-error" *ngIf="errorMsg">⚠ {{ errorMsg }}</div>

        <div class="forgot" routerLink="/forgot-password">Forgot password?</div>
        
        <button type="submit" class="submit-btn" [disabled]="loading">
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>

        <!-- OR divider -->
        <div class="or-divider">
          <span class="or-line"></span>
          <span class="or-text">OR</span>
          <span class="or-line"></span>
        </div>

        <!-- Google Sign-In Button -->
        <button type="button" class="google-btn" (click)="loginWithGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Sign in with Google</span>
        </button>

        <div class="switch-link">
          Don't have an account?
          <a routerLink="/signup">Signup</a>
        </div>

      </form>
    </div>

  </div>
</div>
