<div class="auth-container">
  <div class="auth-card">
 
    <!-- Logo / Title -->
    <div class="auth-header">
      <div class="logo">📐</div>
      <h1>Quantity Measurement</h1>
      <p>Sign in to continue</p>
    </div>
 
    <!-- Google Button -->
    <button class="google-btn" (click)="onGoogle()" [disabled]="isLoading">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Continue with Google
    </button>
 
    <div class="divider"><span>or</span></div>
 
    <!-- Tabs -->
    <div class="tabs">
      <button [class.active]="activeTab === 'login'"
              (click)="activeTab = 'login'">Login</button>
      <button [class.active]="activeTab === 'register'"
              (click)="activeTab = 'register'">Register</button>
    </div>
 
    <!-- ── Login Form ──────────────────────────────────────────────────────── -->
    <div *ngIf="activeTab === 'login'" class="form">
 
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="loginEmail"
               placeholder="Enter your email" />
      </div>
 
      <!-- Password with show/hide toggle -->
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input [type]="showLoginPassword ? 'text' : 'password'"
                 [(ngModel)]="loginPassword"
                 placeholder="Enter your password" />
          <button type="button" class="eye-btn"
                  (click)="toggleLoginPassword()"
                  [title]="showLoginPassword ? 'Hide password' : 'Show password'">
            {{ showLoginPassword ? '🙈' : '👀' }}
          </button>
        </div>
      </div>
 
      <div class="error-msg" *ngIf="loginError">{{ loginError }}</div>
 
      <button class="submit-btn" (click)="onLogin()" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Login' }}
      </button>
    </div>
 
    <!-- ── Register Form ───────────────────────────────────────────────────── -->
    <div *ngIf="activeTab === 'register'" class="form">
 
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="registerFullName"
               placeholder=" e.g: Harsh Vardhan" />
        <small class="hint">First · Last</small>
      </div>
 
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="registerEmail"
               placeholder="Enter your email" />
      </div>
 
      <!-- Password with show/hide toggle -->
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input [type]="showRegisterPassword ? 'text' : 'password'"
                 [(ngModel)]="registerPassword"
                 placeholder="Min 8 chars, upper, lower, number, special" />
          <button type="button" class="eye-btn"
                  (click)="toggleRegisterPassword()"
                  [title]="showRegisterPassword ? 'Hide password' : 'Show password'">
            {{ showRegisterPassword ? '🙈' : '👀' }}
          </button>
        </div>
        <small class="hint">needs uppercase, lowercase, number & special char minimum 8 digit required</small>
      </div>
 
      <!-- Confirm Password with show/hide toggle -->
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrapper">
          <input [type]="showRegisterConfirmPassword ? 'text' : 'password'"
                 [(ngModel)]="registerConfirmPassword"
                 placeholder="Repeat your password" />
          <button type="button" class="eye-btn"
                  (click)="toggleRegisterConfirmPassword()"
                  [title]="showRegisterConfirmPassword ? 'Hide password' : 'Show password'">
            {{ showRegisterConfirmPassword ? '🙈' : '👀' }}
          </button>
        </div>
      </div>
 
      <div class="error-msg"   *ngIf="registerError">{{ registerError }}</div>
      <div class="success-msg" *ngIf="registerSuccess">{{ registerSuccess }}</div>
 
      <button class="submit-btn" (click)="onRegister()" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Register' }}
      </button>
    </div>
 
  </div>
</div>
