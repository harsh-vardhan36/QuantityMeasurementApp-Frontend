<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-left">
      <img src="Icon.jpeg" alt="QM Logo" class="brand-img" />
      <div class="brand">QUANTITY<br>MEASUREMENT</div>
    </div>

    <div class="auth-right">
      <div class="tabs">
        <button type="button" class="tab-btn" routerLink="/login">LOGIN</button>
        <button type="button" class="tab-btn active">SIGNUP</button>
      </div>

      <div class="success-banner" *ngIf="successMsg">✅ {{ successMsg }}</div>

      <form #signupForm="ngForm" (ngSubmit)="onSubmit(signupForm)" novalidate>

        <div class="field-label">Full Name</div>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" name="name" placeholder="Full Name"
            [(ngModel)]="name" required minlength="2"
            #nameField="ngModel" [class.input-error]="nameField.invalid && nameField.touched" />
        </div>
        <div class="field-error" *ngIf="nameField.invalid && nameField.touched">Full name is required.</div>

        <div class="field-label">Mobile No.</div>
        <div class="input-wrap">
          <span class="icon">📞</span>
          <input type="tel" name="mobile" placeholder="10-digit mobile number"
            [(ngModel)]="mobile" required pattern="[0-9]{10}"
            #mobileField="ngModel" [class.input-error]="mobileField.invalid && mobileField.touched" />
        </div>
        <div class="field-error" *ngIf="mobileField.invalid && mobileField.touched">
          Mobile number must be exactly 10 digits.
        </div>

        <div class="field-label">Email Id</div>
        <div class="input-wrap">
          <span class="icon">✉</span>
          <input type="email" name="email" placeholder="Email Id"
            [(ngModel)]="email" required email
            #emailField="ngModel" [class.input-error]="emailField.invalid && emailField.touched" />
        </div>
        <div class="field-error" *ngIf="emailField.invalid && emailField.touched">Enter a valid email address.</div>

        <div class="field-label">Password</div>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" name="password" placeholder="Min 8 chars, upper, lower, number, special"
            [(ngModel)]="password" required minlength="8"
            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$"
            #passField="ngModel" [class.input-error]="passField.invalid && passField.touched" />
        </div>
        <div class="field-error" *ngIf="passField.invalid && passField.touched">
          Min 8 chars with uppercase, lowercase, number &amp; special character.
        </div>

        <div class="api-error" *ngIf="errorMsg">⚠ {{ errorMsg }}</div>

        <button type="submit" class="submit-btn" [disabled]="loading">
          {{ loading ? 'Creating account...' : 'Signup' }}
        </button>

        <!-- OR divider -->
        <div class="or-divider">
          <span class="or-line"></span>
          <span class="or-text">OR</span>
          <span class="or-line"></span>
        </div>

        <!-- Google Sign-In Button -->
        <button type="button" class="google-btn" (click)="loginWithGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Sign up with Google</span>
        </button>

        <div class="switch-link">
          Already have an account? <a routerLink="/login">Login</a>
        </div>

      </form>
    </div>
  </div>
</div>
