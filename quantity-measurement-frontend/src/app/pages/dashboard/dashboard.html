<div class="dashboard-wrap">

  <div class="header">
    <span class="user-greeting">Hi, {{ userName }}</span>
    <h1>Welcome To Quantity Measurement</h1>
    <button type="button" class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <div class="dash-body">

    <div class="section-label">Quick Access</div>
    <div class="quick-grid">
      <div class="quick-card" (click)="goTo('measurement')">
        <span class="quick-icon">🧮</span>
        <div class="quick-title">Calculator</div>
        <div class="quick-sub">Compare, Convert & Arithmetic</div>
      </div>
      <div class="quick-card" (click)="goTo('history')">
        <span class="quick-icon">📋</span>
        <div class="quick-title">History</div>
        <div class="quick-sub">All past calculations</div>
      </div>
    </div>

    <div class="section-label" style="margin-top: 28px;">Operation Stats</div>

    <div class="loading-msg" *ngIf="loading">Loading stats...</div>

    <div class="stats-grid" *ngIf="!loading">
      <div class="stat-card" *ngFor="let s of stats" [style.border-top-color]="s.color">
        <span class="stat-icon">{{ s.icon }}</span>
        <div class="stat-value" [style.color]="s.color">{{ s.value }}</div>
        <div class="stat-label">{{ s.label }}</div>
      </div>
    </div>

    <div class="section-label" style="margin-top: 28px;">Per-Operation Count</div>
    <div class="op-table" *ngIf="!loading">
      <div class="op-row" *ngFor="let op of operations">
        <span class="op-name-badge" [ngClass]="'op-' + op.toLowerCase()">{{ op }}</span>
        <div class="op-bar-wrap">
          <div class="op-bar" [style.width.%]="getBarPct(op)"></div>
        </div>
        <span class="op-count">{{ opCounts[op] || 0 }}</span>
      </div>
    </div>

  </div>
</div>
