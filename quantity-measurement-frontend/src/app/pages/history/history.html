<!-- Navbar -->
<div class="navbar">
  <h2>My History</h2>
  <div class="nav-actions">
    <button class="nav-btn" (click)="goToMeasurement()">Calculator</button>
    <button class="nav-btn logout" (click)="logout()">Logout</button>
  </div>
</div>
 
<div class="page">
 
  <!-- Search bar -->
  <div class="search-row">
    <input
      type="text"
      class="search-input"
      placeholder="Search by unit, operation..."
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearch()" />
    <span class="total-badge">{{ filtered.length }} records</span>
  </div>
 
  <!-- Filter tabs -->
  <div class="tab-row">
    <button
      *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="activeTab === tab.key"
      (click)="selectTab(tab.key)">
      {{ tab.label }}
    </button>
  </div>
 
  <!-- Loading -->
  <div class="state-box" *ngIf="isLoading">
    <p>Loading your history...</p>
  </div>
 
  <!-- Error -->
  <div class="state-box error" *ngIf="error && !isLoading">
    <p>{{ error }}</p>
  </div>
 
  <!-- Empty -->
  <div class="state-box" *ngIf="!isLoading && !error && filtered.length === 0">
    <p>No records found.</p>
    <button class="go-btn" (click)="goToMeasurement()">Start calculating</button>
  </div>
 
  <!-- Records grid -->
  <div class="records-grid" *ngIf="!isLoading && filtered.length > 0">
    <div class="record-card" *ngFor="let r of filtered" [class.errored]="r.error">
 
      <!-- Op badge -->
      <div class="op-badge" [style.background]="opColor(r.operation)">
        {{ r.operation }}
      </div>
 
      <!-- Type pill -->
      <div class="type-pill">{{ r.thisMeasurementType?.replace('Unit','') }}</div>
 
      <!-- Input -->
      <p class="record-input" [innerHTML]="formatInput(r)"></p>
 
      <!-- Result -->
      <div class="record-result" [class.error-result]="r.error">
        {{ formatResult(r) }}
      </div>
 
    </div>
  </div>
 
</div>
